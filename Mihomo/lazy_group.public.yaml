# Auto-generated by scripts/sync_rules.py.
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true
dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://doh.dns.sb/dns-query
    - https://dns.cloudflare.com/dns-query
    - https://dns.twnic.tw/dns-query
    - tls://8.8.4.4:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxy-providers:
  subscription:
    type: http
    url: "https://example.com/your-subscription-url"
    path: ./proxy_providers/subscription.yaml
    interval: 86400
    exclude-filter: '一元机场|官网|官方|流量|剩余|套餐|到期|过期|订阅|防失联|群组|频道'
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600
      timeout: 5000
      lazy: true
      expected-status: 204

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 自动选择
      - 🇭🇰 香港节点
      - 🇹🇼 台湾节点
      - 🇯🇵 日本节点
      - 🇸🇬 新加坡节点
      - 🇰🇷 韩国节点
      - 🇺🇸 美国节点
      - DIRECT

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛡️ 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 自动选择
    type: url-test
    use:
      - subscription
    url: "https://www.gstatic.com/generate_204"
    interval: 600
    timeout: 5000
    tolerance: 50
    lazy: true
    expected-status: 204

  - name: 🇭🇰 香港节点
    type: url-test
    use:
      - subscription
    filter: "(?i)🇭🇰|HK|Hong|香港|深港|沪港|京港|港"
    url: "https://www.gstatic.com/generate_204"
